<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">

  <!-- Matches extra-rounded corner style of QR -->
  <rect width="32" height="32" rx="10" ry="10" fill="#07090d"/>

  <!-- Left node -->
  <circle cx="6" cy="16" r="3.5" fill="#00d4ff"/>

  <!-- Right node -->
  <circle cx="26" cy="16" r="3.5" fill="#00d4ff"/>

  <!-- Connection line left -->
  <line x1="9.5" y1="16" x2="13" y2="16" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Connection line right -->
  <line x1="19" y1="16" x2="22.5" y2="16" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Shield (center) -->
  <path d="M16 9.5 L20 11.2 L20 15.5 C20 18 16 20.5 16 20.5 C16 20.5 12 18 12 15.5 L12 11.2 Z"
        fill="#0d1117" stroke="#00d4ff" stroke-width="1.2" stroke-linejoin="round"/>

  <!-- Lock body -->
  <rect x="14.2" y="15" width="3.6" height="2.8" rx="0.6" fill="#00d4ff"/>

  <!-- Lock shackle -->
  <path d="M14.8 15 L14.8 13.8 C14.8 12.8 17.2 12.8 17.2 13.8 L17.2 15"
        stroke="#00d4ff" stroke-width="1.1" stroke-linecap="round" fill="none"/>
</svg>