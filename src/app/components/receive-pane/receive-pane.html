<div class="section">
    <div class="section__head">
      <div class="section__title">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Receive
      </div>
      <div class="status-pill" [attr.data-status]="recvStatus()">
        <span class="status-dot"></span>
        {{ statusLabel(recvStatus()) }}
      </div>
    </div>

    <!-- Directory picker -->
    <div class="dir-picker" [class.selected]="!!saveDirectory()">
      <div class="dir-picker__info">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="1.5"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
        <span>{{ saveDirectory() ?? 'No folder selected' }}</span>
      </div>
      <button class="dir-btn" (click)="onDirectorySelect()">
        {{ saveDirectory() ? 'Change' : 'Choose folder' }}
      </button>
    </div>

    <!-- Progress -->
    <div class="progress-wrap" *ngIf="recvStatus() === 'active' || recvStatus() === 'done'">
      <div class="progress-bar">
        <div class="progress-bar__fill" [style.width.%]="recvProgress()"></div>
      </div>
      <div class="progress-meta">
        <span>{{ recvProgress() }}%</span>
        <span *ngIf="recvStatus() === 'done'" class="done-tag">✓ Received</span>
      </div>
    </div>

    <!-- Action -->
    <button
      class="btn"
      [class.btn--ghost]="recvStatus() === 'done'"
      [disabled]="recvStatus() === 'idle' || recvStatus() === 'active'"
      (click)="recvStatus() === 'done' ? resetRecv() : startReceive()">
      {{ recvStatus() === 'done' ? 'Receive another' : 'Start receiving' }}
    </button>
  </div>
