<head>
  <link rel="canonical" href="https://whispr-file.vercel.app" />
</head>

<div class="shell">

  <header class="topbar">
    <div class="topbar__inner">
      <h1 class="logo">Whisp<em>r</em></h1>

      <button class="theme-toggle" (click)="toggleTheme()" [attr.aria-label]="isDark() ? 'Switch to light' : 'Switch to dark'">
        <svg *ngIf="isDark()" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
        <svg *ngIf="!isDark()" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- <section class="hero">
    <h1 class="hero__title">Whispr</h1>
    <p class="hero__sub">Peer-to-peer file transfer. No cloud, no limits.</p>
  </section> -->

  <main class="stage">
    <div class="stage__panel">
      <ng-content />
    </div>
  </main>

  <footer class="foot">
    <div class="foot__inner">
      <span>P2P · Encrypted · No cloud</span>
    </div>
  </footer>

</div>
